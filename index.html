<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LingoVibe — Almanca Sözlük</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

 tailwind.config={darkMode:['class','[data-theme="dark"]'],theme:{extend:{fontFamily:{headline:['Plus Jakarta Sans','sans-serif'],body:['Be Vietnam Pro','sans-serif'],label:['Lexend','sans-serif']},colors:{bg:'#e9f9ff',ink:'#00343e',muted:'#4a7e8d',primary:'#00666e',primarySoft:'#6deffe',darkbg:'#071e24',darkcard:'#0d2d35'}}}}

<style>
 body{min-height:100dvh} .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24} .no-scrollbar::-webkit-scrollbar{display:none} .no-scrollbar{scrollbar-width:none;-ms-overflow-style:none}
 .fav-on{font-variation-settings:'FILL' 1}

<body class="bg-bg text-ink font-body dark:bg-darkbg dark:text-white">
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-darkcard/85 border-b border-ink/5 dark:border-white/10 backdrop-blur">
  <div class="max-w-6xl mx-auto h-16 px-4 flex items-center justify-between">
    <div><h1 class="font-headline font-extrabold text-xl">LingoVibe</h1><p class="text-xs text-muted dark:text-white/60">Almanca–Türkçe sözlük</p></div>
    <div class="flex items-center gap-2">
      <button id="backupBtn" class="h-11 px-3 rounded-full bg-white dark:bg-darkbg border border-ink/10 dark:border-white/10 flex items-center gap-1.5 text-sm font-label text-primary dark:text-primarySoft" title="İlerlemeni dosyaya kaydet"><span class="material-symbols-outlined text-lg">download</span><span class="hidden sm:inline">Yedekle</span></button>
      <button id="restoreBtn" class="h-11 px-3 rounded-full bg-white dark:bg-darkbg border border-ink/10 dark:border-white/10 flex items-center gap-1.5 text-sm font-label text-primary dark:text-primarySoft" title="Yedek dosyadan geri yükle"><span class="material-symbols-outlined text-lg">upload</span><span class="hidden sm:inline">Geri Yükle</span></button>
      <input id="restoreFile" type="file" accept="application/json" class="hidden">
      <button id="themeToggle" class="w-11 h-11 rounded-full bg-white dark:bg-darkbg border border-ink/10 dark:border-white/10 flex items-center justify-center"><span class="material-symbols-outlined text-primary dark:text-primarySoft">dark_mode</span></button>
    </div>
  </div>
</header>
<main class="max-w-6xl mx-auto px-4 pt-24 pb-24 space-y-5">
  <section class="rounded-3xl bg-gradient-to-br from-primary to-cyan-300 text-white p-5 shadow-lg">
    <h2 class="font-headline font-extrabold text-2xl">Seç ve çalış</h2>
    <p id="infoText" class="mt-1 text-white/85">Bir seviye seç, kelimeleri incele, dinle ve favorile.</p>
    <div class="mt-4">
      <div class="flex items-center justify-between text-sm font-label mb-1.5">
        <span id="progLabel">0 / 13.566 kelime</span>
        <span id="progPct" class="font-bold">%0</span>
      </div>
      <div class="h-2.5 rounded-full bg-white/25 overflow-hidden">

      </div>
    </div>
  </section>

  <section class="space-y-3">
    <div class="relative"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-muted">search</span><input id="searchInput" class="w-full pl-12 pr-4 py-4 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 outline-none focus:ring-2 focus:ring-primary" placeholder="Almanca veya Türkçe ara..."></div>
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="levelRow">
      <button class="level-btn px-4 py-2.5 rounded-full bg-primary text-white whitespace-nowrap" data-level="ALL">Tümü</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="FAV"><span class="material-symbols-outlined text-base align-middle">star</span> Favoriler</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="KNOWN"><span class="material-symbols-outlined text-base align-middle">check_circle</span> Bildiklerim</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="A1">A1</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="A2">A2</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="B1">B1</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="B2">B2</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="C1">C1</button>
      <button class="level-btn px-4 py-2.5 rounded-full bg-white dark:bg-darkcard border border-ink/10 dark:border-white/10 whitespace-nowrap" data-level="C2">C2</button>
    </div>
  </section>

  <section class="grid grid-cols-2 sm:grid-cols-4 gap-3">
    <div class="bg-white dark:bg-darkcard rounded-3xl p-4 border border-ink/5 dark:border-white/10"><p class="text-sm text-muted dark:text-white/60">Gösterilen</p><p id="visibleCount" class="font-headline text-2xl font-extrabold">0</p></div>
    <div class="bg-white dark:bg-darkcard rounded-3xl p-4 border border-ink/5 dark:border-white/10"><p class="text-sm text-muted dark:text-white/60">Seviye</p><p id="levelText" class="font-headline text-2xl font-extrabold">Tümü</p></div>
    <div class="bg-white dark:bg-darkcard rounded-3xl p-4 border border-ink/5 dark:border-white/10"><p class="text-sm text-muted dark:text-white/60">Favori</p><p id="favCount" class="font-headline text-2xl font-extrabold">0</p></div>
    <div class="bg-white dark:bg-darkcard rounded-3xl p-4 border border-ink/5 dark:border-white/10"><p class="text-sm text-muted dark:text-white/60">Bildiklerim</p><p id="knownCount" class="font-headline text-2xl font-extrabold">0</p></div>
  </section>

  <section id="list" class="space-y-3"></section>
  <div id="sentinel" class="h-10"></div>
  <div id="loadingMore" class="hidden text-center text-sm text-muted dark:text-white/50 py-2">Yükleniyor…</div>
  <div id="empty" class="hidden bg-white dark:bg-darkcard rounded-3xl p-6 text-center border border-dashed border-ink/15 dark:border-white/10">Sonuç bulunamadı.</div>
</main>

// ── State ──
let levelFilter='ALL', searchTerm='', theme='light';
let filtered=[], shown=0;
const PAGE=40;

// ── Favorites (persisted) ──
const FAV_KEY='lingovibe_favs';
let favs=new Set();
try{ favs=new Set(JSON.parse(localStorage.getItem(FAV_KEY)||'[]')); }catch(e){}
function saveFavs(){ try{ localStorage.setItem(FAV_KEY, JSON.stringify([...favs])); }catch(e){} }

const KNOWN_KEY='lingovibe_known';
let known=new Set();
try{ known=new Set(JSON.parse(localStorage.getItem(KNOWN_KEY)||'[]')); }catch(e){}

// ── DOM ──
const list=document.getElementById('list');
const empty=document.getElementById('empty');
const visibleCount=document.getElementById('visibleCount');
const levelText=document.getElementById('levelText');
const favCount=document.getElementById('favCount');
const knownCount=document.getElementById('knownCount');
const progLabel=document.getElementById('progLabel');
const progPct=document.getElementById('progPct');
const progBar=document.getElementById('progBar');
const TOTAL=words.length;
function updateProgress(){
  const n=known.size;
  const pct=TOTAL? (n/TOTAL*100):0;
  progLabel.textContent=`${n.toLocaleString('tr-TR')} / ${TOTAL.toLocaleString('tr-TR')} kelime`;
  let pctText;
  if(pct===0) pctText='%0';
  else if(pct<1) pctText='%'+pct.toFixed(2);
  else pctText='%'+Math.round(pct);
  progPct.textContent=pctText;
  progBar.style.width=Math.max(pct,0.5)+'%';
}
const infoText=document.getElementById('infoText');
const sentinel=document.getElementById('sentinel');
const loadingMore=document.getElementById('loadingMore');
const levelBtns=[...document.querySelectorAll('.level-btn')];
const levelNames={ALL:'Tümü',FAV:'Favoriler',KNOWN:'Bildiklerim',A1:'A1',A2:'A2',B1:'B1',B2:'B2',C1:'C1',C2:'C2'};

// ── Helpers ──
function norm(s){return (s||'').toLocaleLowerCase('tr').normalize('NFD').replace(/\p{Diacritic}/gu,'')}
function articleInfo(w){
  const t=(w||'').toLowerCase().split(' ')[0];
  if(t==='der') return {cls:'bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300', show:true};
  if(t==='die') return {cls:'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300', show:true};
  if(t==='das') return {cls:'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300', show:true};
  return {cls:'', show:false};
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ── Speech (German TTS) ──
let deVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices(); deVoice=vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith('de'))||null; }
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=.9; if(deVoice) u.voice=deVoice;
  speechSynthesis.speak(u);
}

// ── Filtering ──
function computeFiltered(){
  const q=norm(searchTerm.trim());
  filtered=words.filter(x=>{
    // Special tabs show their own set; the "browsing" views (ALL + levels) hide both known and favorited words
    if(levelFilter==='KNOWN'){
      if(!known.has(x.id)) return false;
    } else if(levelFilter==='FAV'){
      if(!favs.has(x.id)) return false;
    } else {
      // ALL or a level (A1..C2): hide words that are known OR favorited
      if(known.has(x.id) || favs.has(x.id)) return false;
      if(levelFilter!=='ALL' && x.level!==levelFilter) return false;
    }
    const searchOk = !q || norm(x.de).includes(q) || norm(x.tr).includes(q);
    return searchOk;
  });
}

// ── Render card ──
function cardHTML(x){
  const ai=articleInfo(x.de);
  const isFav=favs.has(x.id);
  const isKnown=known.has(x.id);
  const badge = ai.show
    ? `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ${ai.cls}">${esc(x.de.split(' ')[0])}</span>`
    : `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-primary/10 text-primary dark:text-primarySoft">${esc(x.level)}</span>`;
  return `<article class="bg-white dark:bg-darkcard rounded-2xl p-4 border border-ink/5 dark:border-white/10 shadow-sm">
    <div class="flex items-start gap-3">
      <div class="w-9 h-9 rounded-full bg-primary/10 text-primary dark:text-primarySoft flex items-center justify-center font-label font-bold shrink-0 text-sm">${x.id}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">${badge}<p class="font-bold break-words">${esc(x.de)}</p></div>
        <p class="text-sm text-muted dark:text-white/60">${esc(x.tr)}</p>
        <p class="text-xs mt-1 text-muted/80 dark:text-white/40">Seviye: ${esc(x.level)}</p>
      </div>
      <div class="flex flex-col gap-1 shrink-0">
        <button class="speak-btn w-9 h-9 rounded-full bg-primary/10 hover:bg-primary/20 text-primary dark:text-primarySoft flex items-center justify-center" data-de="${esc(x.de)}" title="Dinle"><span class="material-symbols-outlined text-xl">volume_up</span></button>
        <button class="fav-btn w-9 h-9 rounded-full ${isFav?'bg-amber-100 text-amber-500 dark:bg-amber-900/40':'bg-ink/5 dark:bg-white/10 text-muted dark:text-white/50'} flex items-center justify-center" data-id="${x.id}" title="Favori"><span class="material-symbols-outlined text-xl ${isFav?'fav-on':''}">star</span></button>
        <button class="known-btn w-9 h-9 rounded-full ${isKnown?'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/40':'bg-ink/5 dark:bg-white/10 text-muted dark:text-white/50'} flex items-center justify-center" data-id="${x.id}" title="${isKnown?'Bunu öğrenmem gerek':'Bunu biliyorum'}"><span class="material-symbols-outlined text-xl ${isKnown?'fav-on':''}">${isKnown?'check_circle':'check'}</span></button>
      </div>
    </div>
  </article>`;
}

// ── Lazy rendering ──
function resetList(){
  list.innerHTML=''; shown=0;
  computeFiltered();
  visibleCount.textContent=filtered.length.toLocaleString('tr-TR');
  levelText.textContent=levelNames[levelFilter]||levelFilter;
  favCount.textContent=favs.size.toLocaleString('tr-TR');
  knownCount.textContent=known.size.toLocaleString('tr-TR');
  updateProgress();
  infoText.textContent = levelFilter==='ALL' ? 'Bildiklerin gizli. Aşağı kaydır.' :
    levelFilter==='FAV' ? `${favs.size} favori kelimen var.` :
    levelFilter==='KNOWN' ? `${known.size} kelimeyi biliyorsun. 🎉` :
    `${levelFilter} seviyesi seçildi.`;
  empty.classList.toggle('hidden', filtered.length!==0);
  loadMore();
  levelBtns.forEach(b=>{
    const active=b.dataset.level===levelFilter;
    b.className=`level-btn px-4 py-2.5 rounded-full whitespace-nowrap border ${active?'bg-primary text-white border-primary':'bg-white dark:bg-darkcard border-ink/10 dark:border-white/10'}`;
  });
}
function loadMore(){
  if(shown>=filtered.length) return;
  const slice=filtered.slice(shown, shown+PAGE);
  const html=slice.map(cardHTML).join('');
  list.insertAdjacentHTML('beforeend', html);
  shown+=slice.length;
}

// ── Infinite scroll via IntersectionObserver ──

  if(entries[0].isIntersecting){

// ── Events (delegated for perf) ──
list.addEventListener('click', e=>{
  const sp=e.target.closest('.speak-btn');
  if(sp){ speak(sp.dataset.de); return; }
  const fv=e.target.closest('.fav-btn');
  if(fv){
    const id=Number(fv.dataset.id);
    const on=!favs.has(id);
    if(on) favs.add(id); else favs.delete(id);
    saveFavs();
    favCount.textContent=favs.size.toLocaleString('tr-TR');
    // In browsing views (ALL/levels) a favorited word leaves the list; in FAV view, un-favoriting removes it.
    const inBrowse = !(levelFilter==='FAV'||levelFilter==='KNOWN');
    const shouldVanish = (inBrowse && on) || (levelFilter==='FAV' && !on);
    if(shouldVanish){
      const card=fv.closest('article');
      if(card){
        card.style.transition='opacity .25s ease, transform .25s ease';
        card.style.opacity='0'; card.style.transform='translateX(24px)';
        setTimeout(resetList, 260);
      } else { resetList(); }
    } else {
      // just toggle the star visual in place
      fv.className=`fav-btn w-9 h-9 rounded-full ${on?'bg-amber-100 text-amber-500 dark:bg-amber-900/40':'bg-ink/5 dark:bg-white/10 text-muted dark:text-white/50'} flex items-center justify-center`;
      fv.querySelector('span').classList.toggle('fav-on', on);
    }
    return;
  }
  const kn=e.target.closest('.known-btn');
  if(kn){
    const id=Number(kn.dataset.id);
    const card=kn.closest('article');
    const willKnow=!known.has(id);
    if(willKnow) known.add(id); else known.delete(id);
    saveKnown();
    knownCount.textContent=known.size.toLocaleString('tr-TR');
    // Card disappears from current view: animate out, then rebuild list
    if(card){
      card.style.transition='opacity .25s ease, transform .25s ease, max-height .3s ease, margin .3s ease, padding .3s ease';
      card.style.overflow='hidden';
      card.style.opacity='0';
      card.style.transform='translateX(24px)';
      setTimeout(()=>{ resetList(); }, 260);
    } else {
      resetList();
    }
    return;
  }
});

levelBtns.forEach(b=>b.addEventListener('click',()=>{ levelFilter=b.dataset.level; resetList(); window.scrollTo({top:0,behavior:'smooth'}); }));

let searchTimer=null;
document.getElementById('searchInput').addEventListener('input',e=>{
  searchTerm=e.target.value;
  clearTimeout(searchTimer);
  searchTimer=setTimeout(resetList, 180); // debounce for smoothness
});

document.getElementById('themeToggle').addEventListener('click',()=>{
  theme=theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',theme);
  document.querySelector('#themeToggle .material-symbols-outlined').textContent=theme==='light'?'dark_mode':'light_mode';
});

// ── Backup / Restore ──
document.getElementById('backupBtn').addEventListener('click',()=>{
  const data={
    app:'LingoVibe', version:1, date:new Date().toISOString(),
    known:[...known], favs:[...favs]
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const stamp=new Date().toISOString().slice(0,10);
  a.href=url; a.download=`lingovibe-yedek-${stamp}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },100);
});

document.getElementById('restoreBtn').addEventListener('click',()=>document.getElementById('restoreFile').click());
document.getElementById('restoreFile').addEventListener('change',e=>{
  const file=e.target.files&&e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      const newKnown=Array.isArray(data.known)?data.known.map(Number):[];
      const newFavs=Array.isArray(data.favs)?data.favs.map(Number):[];
      const merge=confirm(`Yedek bulundu: ${newKnown.length} bilinen, ${newFavs.length} favori kelime.\n\nTAMAM = mevcutla birleştir\nİPTAL = sadece yedektekiler kalsın (değiştir)`);
      if(merge){
        newKnown.forEach(id=>known.add(id));
        newFavs.forEach(id=>favs.add(id));
      } else {
        known=new Set(newKnown);
        favs=new Set(newFavs);
      }
      saveKnown(); saveFavs(); resetList();
      alert('Geri yükleme tamam! ✅');
    }catch(err){
      alert('Dosya okunamadı. Geçerli bir yedek dosyası mı?');
    }
    e.target.value='';
  };
  reader.readAsText(file);
});

// ── Init ──
resetList();
</script>
